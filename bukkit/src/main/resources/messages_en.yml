#AdvancedSensitiveWords-Pro Messages configuration
#Chat related messages
Chat:
  #Messages on Chat
  messageOnChat: '<red>Your message contains blocked words.'
#Sign check related messages
Sign:
  #Messages on Sign editing
  messageOnSign: '<red>Your sign text contains blocked words.'
#Anvil check related messages
Anvil:
  #Messages on Anvil renaming
  messageOnAnvilRename: '<red>That item name contains blocked words.'
#Book check related messages
Book:
  #Messages on Book editing
  messageOnBook: '<red>Your book contains blocked words.'
#Player name check related messages
Name:
  #Messages on Player name
  messageOnName: '<red>Your username contains blocked words. Please change it or contact an administrator.'
#Player item check related messages
Item:
  #Messages on Player item
  messageOnItem: '<red>This item contains blocked words.'
#Plugin related messages
Plugin:
  #Reload command
  messageOnCommandReload: '<green>AdvancedSensitiveWords has been reloaded.'
  #Violation reset message
  messageOnViolationReset: '<green><bold>All player violation counts have been reset.'
  #Help command
  messageOnCommandHelp: |-
    <aqua>AdvancedSensitiveWords<reset>---<aqua> Help Menu
    <gray>/asw reload: <green>Reload the word filter and plugin configuration
    <gray>/asw reloadconfig: <green>Reload the plugin configuration only
    <gray>/asw add \<word>: <green>Add a word to the blocklist
    <gray>/asw remove \<word>: <green>Remove a word from the blocklist
    <gray>/asw addallow \<word>: <green>Add a word to the allowlist
    <gray>/asw removeallow \<word>: <green>Remove a word from the allowlist
    <gray>/asw status: <green>Show plugin status
    <gray>/asw test \<text>: <green>Test text against the word filter
    <gray>/asw help: <green>Show this help menu
    <gray>/asw info \<player>: <green>Show a player's violation count
    <gray>/asw punish \<player> [method]: <green>Punish a player. Uses the configured punishment when no method is provided
  #Status command
  messageOnCommandStatus: |-
    <aqua>AdvancedSensitiveWords<reset>---<aqua> Plugin Status(%version%)(MC %mc_version%)
    <gray> System: <aqua>%platform% %bit% (Java %java_version% -- %java_vendor%)
    <gray> Initialized: %init%
    <gray> Detection mode: %mode%
    <gray> Filtered messages: %num%
    <gray> Average processing time over the last 20 checks: %ms%
  #Test command
  commandTest:
    #Return message when the test contains sensitive words
    testResultTrue: |-
      <gray> Original message: <red>%original_msg%
      <gray> Filtered message: <green>%processed_msg%
      <gray> Matched words: <aqua>%censored_list%
    #No sensitive words in the test
    testResultPass: '<green>No blocked words were found.'
    #Plugin has not been initialized
    testNotInit: '<red>The plugin has not finished initializing.'
  #Punish command
  commandPunish:
    #Parse error
    parseError: '<red>Could not parse the punishment method. Please check the syntax.'
    #Successfully punished
    success: '<green>Punished %player%.'
  #Add command
  commandAdd:
    #Add success
    success: '<green>Added to the word filter.'
  #Remove command
  commandRemove:
    #Remove success
    success: '<green>Removed from the word filter.'
  #No permission
  noPermission: '<red>You do not have permission to use that command.'
  #Unknown command
  unknownCommand: '<red>Unknown command. Use <gray>/asw help<red>.'
  #Not enough parameters
  argsNotEnough: '<red>Missing arguments. Use <gray>/asw help<red>.'
  #No such player
  noSuchPlayer: '<red>That player could not be found.'
  #Admin notice
  noticeOperator: '<white>[<aqua>ASW<gray>Notify<white>] <red>%player% <gray>triggered %type% filtering. Message: <white>%message% <gray>Matches: <aqua>%censored_list%'
  #Admin notice(Proxy)
  noticeOperatorProxy: '<white>[<aqua>ASW<gray>Notify<white>] <red>%player% <gray>on <aqua>%server_name% <gray>triggered %type% filtering. Message: <white>%message% <gray>Matches: <aqua>%censored_list%'
  #Update is available
  updateAvailable: '<white>[<aqua>ASW<gray>Notify<white>] <gray>A new version is available. Latest: <aqua>%latest_version%<gray>, current: <aqua>%current_version%'
  #Player info
  messageOnCommandInfo: |-
    <aqua>AdvancedSensitiveWords<reset>---<aqua> Player Info
    <gray> Name: <aqua>%player%
    <gray> Violations: <aqua>%violation%
  #Reset violations
  messageOnCommandReset: '<green>Reset violation count for %player%.'
