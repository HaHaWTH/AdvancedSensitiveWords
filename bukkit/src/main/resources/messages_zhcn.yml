# AdvancedSensitiveWords-Pro 插件消息配置
# 聊天检测消息
Chat:
  # 玩家发送敏感消息时候的提示
  messageOnChat: '<red>请勿在聊天中发送敏感词汇.'
# 告示牌检测消息
Sign:
  # 玩家写入敏感消息时的提示
  messageOnSign: '<red>请勿在告示牌中写入敏感词汇.'
# 铁砧重命名检测消息
Anvil:
  # 玩家在铁砧重命名时写入敏感消息的提示
  messageOnAnvilRename: '<red>请勿在铁砧中写入敏感词汇.'
# 书检测消息
Book:
  # 玩家在书中写入敏感消息的提示
  messageOnBook: '<red>请勿在书中写入敏感词汇.'
# 玩家名检测消息
Name:
  # 玩家名包含敏感词时的消息
  messageOnName: '<red>您的用户名包含敏感词,请修改您的用户名或联系管理员.'
# 玩家物品检测消息
Item:
  # 玩家物品包含敏感词时的消息
  messageOnItem: '<red>您的物品包含敏感词.'
# 插件消息
Plugin:
  # 插件重载消息
  messageOnCommandReload: '<green>AdvancedSensitiveWords 已重新加载.'
  # 违规次数重置消息
  messageOnViolationReset: '<aqua>ASW<gray>Notify >> <green>已重置所有玩家的违规次数!'
  # 插件状态菜单
  messageOnCommandStatus: |-
    <aqua>AdvancedSensitiveWords<reset>---<aqua>插件状态(%version%)(MC %mc_version%)
       <gray>系统信息: <aqua>%platform% %bit% (Java %java_version% -- %java_vendor%)
       <gray>初始化: %init%
       <gray>当前模式: %mode%
       <gray>已过滤消息数: %num%
       <gray>近20次处理平均耗时: %ms%
  # 敏感词测试消息(不计入已过滤消息)
  commandTest:
    # 敏感词测试返回
    testResultTrue: |-
      <aqua>一眼丁真, 鉴定为敏感词(鉴定报告)
         <gray>原消息: <red>%original_msg%
         <gray>过滤后消息: <green>%processed_msg%
         <gray>敏感词列表: <aqua>%censored_list%
    # 敏感词测试通过
    testResultPass: '<green>待测消息中没有敏感词喵~'
    # 敏感词测试未初始化
    testNotInit: '<red>插件还没有初始化完毕喵'
  # 惩罚消息
  commandPunish:
    # 解析方法出错
    parseError: '<red>解析方法出错, 请检查指令格式.'
    # 已惩罚
    success: '<green>成功惩罚玩家 %player%.'
  # Add 指令相关
  commandAdd:
    # 敏感词添加成功
    success: '<green>敏感词添加成功.'
  # Remove 指令相关
  commandRemove:
    # 敏感词移除成功
    success: '<green>敏感词移除成功.'
  commandWord:
    # 动态修改词库仅在重载过滤器或重启服务器前生效
    runtimeOnly: '<yellow>通过命令修改的词库仅在本次运行期间生效，重载过滤器或重启服务器后将丢失。'
  # 没有权限执行该指令
  noPermission: '<red>你没有权限执行该指令.'
  # 未知命令
  unknownCommand: '<red>未知命令, 请使用 <gray>/asw help'
  # 参数不足
  argsNotEnough: '<red>参数不足, 请使用 <gray>/asw help'
  # 找不到对应玩家
  noSuchPlayer: '<red>找不到对应玩家.'
  # 管理员提醒消息
  noticeOperator: '<aqua>ASW<gray>Notify >> <gray>玩家 <red>%player% <gray>触发了敏感词检测(%type%)(VL: %violation%)(原消息: %message%) 敏感词列表: <aqua>%censored_list%'
  # 跨服提醒消息
  noticeOperatorProxy: '<aqua>ASW<gray>Notify >> <gray>玩家 <red>%player% (服务器: %server_name%) <gray>触发了敏感词检测(%type%)(VL: %violation%)(原消息: %message%) 敏感词列表: <aqua>%censored_list%'
  # 更新可用
  updateAvailable: '<aqua>ASW<gray>Notify >> <gray>插件有可用更新(%latest_version%), 当前正在运行: <aqua>%current_version%.'
  # 玩家信息
  messageOnCommandInfo: |-
    <aqua>AdvancedSensitiveWords<reset>---<aqua>玩家信息
        <gray>玩家名称: <aqua>%player%
        <gray>违规次数: <aqua>%violation%
  # 重置玩家违规次数
  messageOnCommandReset: '<green>已重置玩家 %player% 的违规次数.'
